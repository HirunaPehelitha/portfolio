<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Hiruna Pehelitha</title>
  <meta name="robots" content="noindex, nofollow" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080808;
      --surface: #111111;
      --card: #161616;
      --border: #1e1e1e;
      --border-light: #2a2a2a;
      --accent: #d4ff00;
      --accent-dim: rgba(212,255,0,0.08);
      --text: #f0f0f0;
      --text-muted: #555;
      --text-dim: #888;
      --danger: #ff4444;
      --radius: 8px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(212,255,0,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(212,255,0,0.025) 1px, transparent 1px);
      background-size: 60px 60px;
      z-index: 0;
      pointer-events: none;
      animation: gridPan 30s linear infinite;
    }

    @keyframes gridPan {
      0% { background-position: 0 0; }
      100% { background-position: 60px 60px; }
    }

    /* Glowing orb */
    body::after {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(212,255,0,0.06) 0%, transparent 70%);
      border-radius: 50%;
      z-index: 0;
      pointer-events: none;
    }

    .login-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 24px;
    }

    /* Brand header */
    .brand {
      text-align: center;
      margin-bottom: 40px;
    }
    .brand-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent-dim);
      border: 1px solid rgba(212,255,0,0.15);
      border-radius: 100px;
      padding: 6px 14px;
      margin-bottom: 20px;
    }
    .brand-badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }
    .brand-badge-text {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .brand-title {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -0.03em;
      color: var(--text);
      line-height: 1;
      margin-bottom: 8px;
    }
    .brand-sub {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 400;
    }

    /* Card */
    .login-card {
      background: var(--card);
      border: 1px solid var(--border-light);
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.02), 0 24px 64px rgba(0,0,0,0.6);
      backdrop-filter: blur(20px);
      position: relative;
      overflow: hidden;
    }

    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212,255,0,0.2), transparent);
    }

    .card-header {
      margin-bottom: 28px;
    }
    .card-title {
      font-size: 15px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 4px;
    }
    .card-sub {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* Form */
    .form-group {
      margin-bottom: 18px;
    }
    .form-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .form-label svg {
      width: 12px;
      height: 12px;
      opacity: 0.6;
    }

    .input-wrap {
      position: relative;
    }
    .form-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      padding: 12px 42px 12px 14px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    .form-input::placeholder { color: var(--text-muted); }
    .form-input:focus {
      border-color: rgba(212,255,0,0.4);
      box-shadow: 0 0 0 3px rgba(212,255,0,0.06);
    }
    .form-input.error {
      border-color: rgba(255,68,68,0.5);
      box-shadow: 0 0 0 3px rgba(255,68,68,0.08);
    }

    .input-icon {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      color: var(--text-muted);
      pointer-events: none;
    }

    .toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s;
    }
    .toggle-pw:hover { color: var(--text); }
    .toggle-pw svg { width: 16px; height: 16px; }

    /* Submit */
    .btn-login {
      width: 100%;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: var(--radius);
      padding: 13px;
      font-size: 13px;
      font-weight: 800;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 0.04em;
      margin-top: 8px;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(212,255,0,0.25);
    }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .btn-login svg { width: 15px; height: 15px; }

    /* Spinner */
    .spinner {
      width: 15px;
      height: 15px;
      border: 2px solid rgba(0,0,0,0.2);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error message */
    .error-msg {
      display: none;
      align-items: center;
      gap: 8px;
      background: rgba(255,68,68,0.08);
      border: 1px solid rgba(255,68,68,0.2);
      border-radius: var(--radius);
      padding: 10px 14px;
      margin-bottom: 18px;
      font-size: 12px;
      font-weight: 600;
      color: var(--danger);
      animation: shake 0.4s ease;
    }
    .error-msg.show { display: flex; }
    .error-msg svg { width: 14px; height: 14px; flex-shrink: 0; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    /* Attempts counter */
    .attempts-left {
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
      margin-top: 14px;
      min-height: 16px;
    }
    .attempts-left.warn { color: var(--danger); }

    /* Footer */
    .login-footer {
      text-align: center;
      margin-top: 28px;
      font-size: 11px;
      color: var(--text-muted);
    }
    .login-footer a {
      color: var(--text-dim);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.15s;
    }
    .login-footer a:hover { color: var(--text); }

    /* Lockout overlay */
    .lockout-overlay {
      position: absolute;
      inset: 0;
      background: rgba(8,8,8,0.95);
      backdrop-filter: blur(4px);
      border-radius: 16px;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      text-align: center;
      padding: 32px;
      z-index: 10;
    }
    .lockout-overlay.show { display: flex; }
    .lockout-icon { font-size: 40px; margin-bottom: 4px; }
    .lockout-title { font-size: 16px; font-weight: 800; color: var(--danger); }
    .lockout-sub { font-size: 12px; color: var(--text-muted); line-height: 1.6; }
    .lockout-timer {
      font-size: 28px;
      font-weight: 900;
      color: var(--text);
      letter-spacing: -0.04em;
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>
<body>

<div class="login-wrapper">

  <!-- Brand -->
  <div class="brand">
    <div class="brand-badge">
      <div class="brand-badge-dot"></div>
      <span class="brand-badge-text">Admin Access</span>
    </div>
    <div class="brand-title">Hiruna Pehelitha</div>
    <div class="brand-sub">Portfolio Management System</div>
  </div>

  <!-- Login Card -->
  <div class="login-card">

    <!-- Lockout overlay -->
    <div class="lockout-overlay" id="lockout-overlay">
      <div class="lockout-icon">🔒</div>
      <div class="lockout-title">Access Suspended</div>
      <div class="lockout-sub">Too many failed attempts.<br>Please wait before trying again.</div>
      <div class="lockout-timer" id="lockout-timer">5:00</div>
    </div>

    <div class="card-header">
      <div class="card-title">Sign in to Dashboard</div>
      <div class="card-sub">Enter your credentials to manage your portfolio</div>
    </div>

    <!-- Error -->
    <div class="error-msg" id="error-msg">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
      <span id="error-text">Invalid credentials. Please try again.</span>
    </div>

    <form id="login-form" autocomplete="off" onsubmit="handleLogin(event)">

      <!-- Username -->
      <div class="form-group">
        <label class="form-label" for="username">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
          Username
        </label>
        <div class="input-wrap">
          <input
            type="text"
            id="username"
            class="form-input"
            placeholder="Enter your username"
            autocomplete="off"
            spellcheck="false"
          />
          <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label class="form-label" for="password">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
          Password
        </label>
        <div class="input-wrap">
          <input
            type="password"
            id="password"
            class="form-input"
            placeholder="Enter your password"
            autocomplete="off"
          />
          <button type="button" class="toggle-pw" onclick="togglePassword()" id="pw-toggle" tabindex="-1">
            <svg id="eye-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-login" id="login-btn">
        <div class="spinner" id="spinner"></div>
        <span id="btn-text">Sign In</span>
        <svg id="btn-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"/></svg>
      </button>

      <div class="attempts-left" id="attempts-info"></div>

    </form>
  </div>

  <div class="login-footer">
    <a href="index.html">← Back to Portfolio</a>
  </div>

</div>

<script>
  // ── Hashed credentials (SHA-256) — plaintext is never stored ──────────────
  const CRED_USER_HASH = '47cfe6813bca219e5c0970ba27d5d88a4984a292a13ab696541ef0cd43c04cee';
  const CRED_PASS_HASH = 'e59750d886ceb9b8f11abc339cd867b0dc339a6d8f0a8bc3b0550dce3ca2842d';
  const SESSION_KEY    = 'portfolio_admin_token';
  const SESSION_TOKEN  = 'hp_adm_2026_session_active';
  const MAX_ATTEMPTS   = 5;
  const LOCKOUT_MS     = 5 * 60 * 1000; // 5 minutes

  let lockoutTimer = null;

  // ── Redirect if already logged in ────────────────────────────────────────
  if (sessionStorage.getItem(SESSION_KEY) === SESSION_TOKEN) {
    window.location.replace('admin.html');
  }

  // ── Check for active lockout on load ─────────────────────────────────────
  function checkLockout() {
    const lockoutUntil = parseInt(localStorage.getItem('admin_lockout_until') || '0');
    if (Date.now() < lockoutUntil) {
      startLockoutUI(lockoutUntil - Date.now());
      return true;
    }
    return false;
  }
  checkLockout();

  // ── SHA-256 via Web Crypto API ────────────────────────────────────────────
  async function sha256(msg) {
    const enc = new TextEncoder().encode(msg);
    const buf = await crypto.subtle.digest('SHA-256', enc);
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  // ── Toggle password visibility ────────────────────────────────────────────
  function togglePassword() {
    const input = document.getElementById('password');
    const icon  = document.getElementById('eye-icon');
    const isHidden = input.type === 'password';
    input.type = isHidden ? 'text' : 'password';
    icon.innerHTML = isHidden
      ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>'
      : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>';
  }

  // ── Show error ─────────────────────────────────────────────────────────────
  function showError(msg) {
    const el = document.getElementById('error-msg');
    document.getElementById('error-text').textContent = msg;
    el.classList.remove('show');
    void el.offsetWidth; // force reflow to replay animation
    el.classList.add('show');
    document.getElementById('username').classList.add('error');
    document.getElementById('password').classList.add('error');
  }

  function clearError() {
    document.getElementById('error-msg').classList.remove('show');
    document.getElementById('username').classList.remove('error');
    document.getElementById('password').classList.remove('error');
  }

  // ── Lockout UI ────────────────────────────────────────────────────────────
  function startLockoutUI(remainingMs) {
    document.getElementById('lockout-overlay').classList.add('show');
    let remaining = Math.ceil(remainingMs / 1000);

    function updateTimer() {
      const m = Math.floor(remaining / 60);
      const s = remaining % 60;
      document.getElementById('lockout-timer').textContent =
        `${m}:${String(s).padStart(2, '0')}`;
      if (remaining <= 0) {
        clearInterval(lockoutTimer);
        document.getElementById('lockout-overlay').classList.remove('show');
        localStorage.removeItem('admin_lockout_until');
        localStorage.setItem('admin_attempt_count', '0');
        document.getElementById('attempts-info').textContent = '';
        document.getElementById('attempts-info').classList.remove('warn');
      }
      remaining--;
    }

    updateTimer();
    lockoutTimer = setInterval(updateTimer, 1000);
  }

  // ── Handle login ──────────────────────────────────────────────────────────
  async function handleLogin(e) {
    e.preventDefault();
    if (checkLockout()) return;

    const btn     = document.getElementById('login-btn');
    const spinner = document.getElementById('spinner');
    const btnText = document.getElementById('btn-text');
    const btnIcon = document.getElementById('btn-icon');

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    if (!username || !password) {
      showError('Both fields are required.');
      return;
    }

    // Loading state
    btn.disabled = true;
    spinner.style.display = 'block';
    btnText.textContent = 'Verifying…';
    btnIcon.style.display = 'none';
    clearError();

    // Small artificial delay for UX + hash computation
    await new Promise(r => setTimeout(r, 700));

    const [userHash, passHash] = await Promise.all([sha256(username), sha256(password)]);
    const valid = userHash === CRED_USER_HASH && passHash === CRED_PASS_HASH;

    spinner.style.display = 'none';
    btnText.textContent = 'Sign In';
    btnIcon.style.display = 'block';
    btn.disabled = false;

    if (valid) {
      // Success
      localStorage.setItem('admin_attempt_count', '0');
      sessionStorage.setItem(SESSION_KEY, SESSION_TOKEN);
      btnText.textContent = 'Success!';
      btn.style.background = '#22c55e';
      setTimeout(() => { window.location.replace('admin.html'); }, 400);
    } else {
      // Failed attempt
      let attempts = parseInt(localStorage.getItem('admin_attempt_count') || '0') + 1;
      localStorage.setItem('admin_attempt_count', String(attempts));

      const remaining = MAX_ATTEMPTS - attempts;
      if (remaining <= 0) {
        const lockUntil = Date.now() + LOCKOUT_MS;
        localStorage.setItem('admin_lockout_until', String(lockUntil));
        localStorage.setItem('admin_attempt_count', '0');
        startLockoutUI(LOCKOUT_MS);
        return;
      }

      showError(`Invalid credentials. ${remaining} attempt${remaining !== 1 ? 's' : ''} remaining.`);
      const attemptsEl = document.getElementById('attempts-info');

      if (remaining <= 2) {
        attemptsEl.textContent = `⚠️ ${remaining} attempt${remaining !== 1 ? 's' : ''} left before lockout`;
        attemptsEl.classList.add('warn');
      }

      document.getElementById('password').value = '';
      document.getElementById('password').focus();
    }
  }

  // ── Clear errors on input ─────────────────────────────────────────────────
  document.getElementById('username').addEventListener('input', clearError);
  document.getElementById('password').addEventListener('input', clearError);
</script>
</body>
</html>
